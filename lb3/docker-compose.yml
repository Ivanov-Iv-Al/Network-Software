version: '3.8'

services:
  tickets-service:
    build: ./services/tickets-service
    container_name: tickets-svc-s10
    ports:
      - "8124:8124"  
    networks:
      - gateway-network
    restart: unless-stopped

  other-service:
    build: ./services/other-service
    container_name: other-svc
    ports:
      - "8233:8233"  
    networks:
      - gateway-network
    restart: unless-stopped

  # API Gateway (Nginx)
  nginx-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "80:80"  # Единая точка входа
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tickets-service
      - other-service
    networks:
      - gateway-network
    restart: unless-stopped

networks:
  gateway-network:
    driver: bridge