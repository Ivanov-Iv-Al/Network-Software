events {
    worker_connections 1024;
}

http {
    # Формат логирования
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Определение сервисов (upstream)
    upstream tickets_service {
        server tickets-service:8124;
    }
    
    upstream other_service {
        server other-service:8233;
    }

    server {
        listen 80;
        server_name localhost;

        # Маршруты для сервиса билетов
        location /api/v1/tickets {
            proxy_pass http://tickets_service/api/v1/tickets;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/tickets/ {
            proxy_pass http://tickets_service/api/v1/tickets/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Маршруты для other сервиса
        location /api/v1/other {
            proxy_pass http://other_service/api/v1/other;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/v1/other/ {
            proxy_pass http://other_service/api/v1/other/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Для Swagger документации
        location /api/v1/tickets/docs {
            proxy_pass http://tickets_service/api/v1/tickets/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/other/docs {
            proxy_pass http://other_service/api/v1/other/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Корневой путь
        location / {
            return 404;
        }
    }
}